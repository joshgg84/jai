<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Settings | JAI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            min-height:100vh;
            transition:background 0.3s ease;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }
        .settings-container{max-width:500px;width:100%;}
        .settings-card{
            background:rgba(10,20,35,0.2);
            backdrop-filter:blur(12px);
            border-radius:30px;
            padding:30px;
            border:1px solid rgba(255,255,255,0.1);
            box-shadow:0 25px 45px rgba(0,0,0,0.3);
        }
        h2{
            color:white;
            margin-bottom:20px;
            text-align:center;
            background:linear-gradient(135deg,#00d4ff,#00ffaa);
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
        }
        .user-info{
            background:rgba(0,0,0,0.3);
            border-radius:20px;
            padding:15px;
            margin-bottom:25px;
            text-align:center;
        }
        .user-info p{color:rgba(255,255,255,0.8);margin:5px 0;}
        .user-info strong{color:#00d4ff;}
        .section{
            margin-bottom:25px;
            border-top:1px solid rgba(255,255,255,0.1);
            padding-top:20px;
        }
        .section h3{color:#00d4ff;margin-bottom:15px;font-size:1.1rem;}
        .bg-options{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            margin-bottom:15px;
        }
        .bg-option{
            width:70px;
            height:70px;
            border-radius:16px;
            cursor:pointer;
            border:2px solid rgba(255,255,255,0.3);
            transition:all 0.2s;
            background-size:cover;
            background-position:center;
        }
        .bg-option.selected{
            border-color:#00d4ff;
            transform:scale(1.05);
            box-shadow:0 0 15px rgba(0,212,255,0.5);
        }
        .bg-default{background:linear-gradient(135deg,#0a0f1e,#0a1a2a);}
        .bg-ocean{background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=200') center/cover;}
        .bg-forest{background:url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=200') center/cover;}
        .bg-mountain{background:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=200') center/cover;}
        .bg-sunset{background:url('https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=200') center/cover;}
        .upload-area{
            margin-top:15px;
            display:flex;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
        }
        .upload-label{
            background:rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.2);
            padding:10px 20px;
            border-radius:40px;
            font-size:0.85rem;
            color:white;
            cursor:pointer;
            transition:0.2s;
        }
        .upload-label:hover{
            background:rgba(255,255,255,0.2);
            border-color:#00d4ff;
        }
        .file-name{font-size:0.7rem;color:rgba(255,255,255,0.6);}
        .save-btn{
            width:100%;
            background:linear-gradient(135deg,#00d4ff,#00aa88);
            border:none;
            border-radius:40px;
            padding:12px;
            font-weight:bold;
            font-size:1rem;
            cursor:pointer;
            margin-top:20px;
            transition:transform 0.2s;
        }
        .save-btn:hover{transform:scale(1.02);}
        .back-link{
            text-align:center;
            margin-top:20px;
        }
        .back-link a{
            color:#00d4ff;
            text-decoration:none;
            font-size:0.9rem;
        }
        .back-link a:hover{text-decoration:underline;}
        .status-msg{
            padding:10px;
            border-radius:12px;
            margin-bottom:15px;
            text-align:center;
            display:none;
        }
        .status-msg.success{background:rgba(0,255,100,0.2);border:1px solid rgba(0,255,100,0.5);color:#88ff88;}
        .status-msg.error{background:rgba(255,80,80,0.2);border:1px solid rgba(255,80,80,0.5);color:#ff8888;}
    </style>
</head>
<body id="settingsBody">
    <div class="settings-container">
        <div class="settings-card">
            <h2>⚙️ Settings</h2>
            
            <div class="user-info">
                <p>👤 <strong id="displayName"></strong></p>
                <p>📅 Joined: <span id="joinDate"></span></p>
            </div>

            <div class="section">
                <h3>🎨 Background</h3>
                <div class="bg-options">
                    <div class="bg-option bg-default" data-bg="default"></div>
                    <div class="bg-option bg-ocean" data-bg="ocean"></div>
                    <div class="bg-option bg-forest" data-bg="forest"></div>
                    <div class="bg-option bg-mountain" data-bg="mountain"></div>
                    <div class="bg-option bg-sunset" data-bg="sunset"></div>
                </div>
                <div class="upload-area">
                    <label class="upload-label">📸 Upload Custom Image
                        <input type="file" id="bgUpload" accept="image/*" style="display:none;">
                    </label>
                    <span id="fileName" class="file-name"></span>
                </div>
            </div>

            <div id="statusMsg" class="status-msg"></div>
            <button class="save-btn" onclick="saveSettings()">💾 Save Changes</button>
            
            <div class="back-link">
                <a href="index.html">← Back to Chat</a>
            </div>
        </div>
    </div>

    <script>
        // Auth check
        const currentUser = localStorage.getItem('jai_current_user');
        if (!currentUser) window.location.href = 'login.html';
        
        const users = JSON.parse(localStorage.getItem('jai_users') || '{}');
        const userData = users[currentUser] || { name: currentUser, created: new Date().toISOString() };
        
        document.getElementById('displayName').textContent = userData.name || currentUser;
        document.getElementById('joinDate').textContent = new Date(userData.created).toLocaleDateString();

        let selectedBg = userData.background?.type || 'default';
        let customBgUrl = userData.background?.url || null;

        // Background preview on page
        const bgMap = {
            default: 'linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%)',
            ocean: 'url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600") center/cover',
            forest: 'url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1600") center/cover',
            mountain: 'url("https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600") center/cover',
            sunset: 'url("https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=1600") center/cover'
        };

        function updatePreview() {
            const body = document.getElementById('settingsBody');
            if (customBgUrl) {
                body.style.background = `url("${customBgUrl}") center/cover fixed`;
            } else {
                body.style.background = bgMap[selectedBg];
            }
            
            // Update selected highlight
            document.querySelectorAll('.bg-option').forEach(opt => {
                opt.classList.remove('selected');
                if (opt.dataset.bg === selectedBg && !customBgUrl) opt.classList.add('selected');
            });
        }

        // Handle background clicks
        document.querySelectorAll('.bg-option').forEach(opt => {
            opt.addEventListener('click', () => {
                selectedBg = opt.dataset.bg;
                customBgUrl = null;
                document.getElementById('fileName').textContent = '';
                updatePreview();
            });
        });

        // Handle upload
        document.getElementById('bgUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    customBgUrl = ev.target.result;
                    selectedBg = null;
                    document.getElementById('fileName').textContent = file.name;
                    updatePreview();
                };
                reader.readAsDataURL(file);
            }
        });

        function showStatus(msg, isSuccess) {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.textContent = msg;
            statusDiv.className = `status-msg ${isSuccess ? 'success' : 'error'}`;
            statusDiv.style.display = 'block';
            setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
        }

        function saveSettings() {
            // Update user background
            const bgPreference = customBgUrl ? { type: 'custom', url: customBgUrl } : { type: selectedBg, url: null };
            users[currentUser] = { ...users[currentUser], background: bgPreference };
            localStorage.setItem('jai_users', JSON.stringify(users));
            
            // Also save to localStorage for quick access
            localStorage.setItem('jai_bg', JSON.stringify(bgPreference));
            
            showStatus('✅ Settings saved successfully!', true);
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        }

        // Load current settings
        if (userData.background) {
            if (userData.background.type === 'custom' && userData.background.url) {
                customBgUrl = userData.background.url;
                selectedBg = null;
            } else {
                selectedBg = userData.background.type;
                customBgUrl = null;
            }
        }
        updatePreview();
    </script>
</body>
</html>
