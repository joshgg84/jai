<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign Up | JAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .signup-container {
            max-width: 450px;
            width: 100%;
        }

        /* Transparent modal with box shadow */
        .signup-card {
            background: rgba(15, 25, 45, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .logo h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Background Selection */
        .bg-selection {
            margin: 20px 0;
            text-align: left;
        }

        .bg-selection label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .bg-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .bg-option {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
            background-size: cover;
            background-position: center;
        }

        .bg-option.selected {
            border-color: #00d4ff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        .bg-default { background: linear-gradient(135deg, #0a0f1e, #0a1a2a); }
        .bg-ocean { background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=200') center/cover; }
        .bg-forest { background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=200') center/cover; }
        .bg-mountain { background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=200') center/cover; }
        .bg-sunset { background: url('https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=200') center/cover; }

        .upload-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .upload-label {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #fff;
            cursor: pointer;
            display: inline-block;
            transition: all 0.2s;
        }

        .upload-label:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00d4ff;
        }

        .signup-btn {
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #00aa88);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            font-size: 1rem;
            color: #0a0f1e;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .signup-btn:hover {
            transform: scale(1.02);
        }

        .login-link {
            margin-top: 18px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }

        .login-link a {
            color: #00d4ff;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: rgba(255, 80, 80, 0.2);
            border: 1px solid rgba(255, 80, 80, 0.5);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            color: #ff8888;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
        }

        .success-msg {
            background: rgba(0, 255, 100, 0.2);
            border: 1px solid rgba(0, 255, 100, 0.5);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            color: #88ff88;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }
    </style>
</head>
<body id="signupBody">
    <div class="signup-container">
        <div class="signup-card">
            <div class="logo">
                <h1>🗣️ JAI</h1>
                <p>Create your account</p>
            </div>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <div class="input-group">
                <label>👤 Username</label>
                <input type="text" id="username" placeholder="Choose a username" autofocus>
            </div>

            <div class="input-group">
                <label>🔑 Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <div class="input-group">
                <label>✓ Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
            </div>

            <!-- Background Selection -->
            <div class="bg-selection">
                <label>🎨 Choose Your Background</label>
                <div class="bg-options">
                    <div class="bg-option bg-default" data-bg="default" data-type="default"></div>
                    <div class="bg-option bg-ocean" data-bg="ocean" data-type="preset"></div>
                    <div class="bg-option bg-forest" data-bg="forest" data-type="preset"></div>
                    <div class="bg-option bg-mountain" data-bg="mountain" data-type="preset"></div>
                    <div class="bg-option bg-sunset" data-bg="sunset" data-type="preset"></div>
                </div>
                <div class="upload-option">
                    <label class="upload-label">📸 Upload Custom Image
                        <input type="file" id="bgUpload" accept="image/*" style="display: none;">
                    </label>
                    <span id="customFileName" style="font-size: 0.7rem; color: rgba(255,255,255,0.6);"></span>
                </div>
            </div>

            <button class="signup-btn" onclick="signup()">Create Account</button>

            <div class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
        <div class="footer">
            Created by Joshua Giwa | Yukuben, Nigeria
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('jai_current_user')) {
            window.location.href = 'index.html';
        }

        let selectedBg = 'default';
        let customBgUrl = null;

        // Background preview on signup page
        const backgrounds = {
            default: 'linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%)',
            ocean: 'url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600") center/cover',
            forest: 'url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1600") center/cover',
            mountain: 'url("https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600") center/cover',
            sunset: 'url("https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=1600") center/cover'
        };

        function updateBackgroundPreview() {
            const body = document.getElementById('signupBody');
            if (customBgUrl) {
                body.style.background = `url("${customBgUrl}") center/cover no-repeat fixed`;
            } else {
                body.style.background = backgrounds[selectedBg];
            }
        }

        // Handle background option clicks
        document.querySelectorAll('.bg-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedBg = opt.dataset.bg;
                customBgUrl = null;
                document.getElementById('customFileName').textContent = '';
                updateBackgroundPreview();
            });
        });

        // Handle custom image upload
        document.getElementById('bgUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    customBgUrl = event.target.result;
                    document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('selected'));
                    document.getElementById('customFileName').textContent = file.name;
                    updateBackgroundPreview();
                };
                reader.readAsDataURL(file);
            }
        });

        // Select default background
        document.querySelector('.bg-default').classList.add('selected');

        function getUsers() {
            const users = localStorage.getItem('jai_users');
            return users ? JSON.parse(users) : {};
        }

        function saveUsers(users) {
            localStorage.setItem('jai_users', JSON.stringify(users));
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = msg;
            successDiv.style.display = 'block';
        }

        function signup() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            if (!username || !password || !confirmPassword) {
                showError('❌ Please fill in all fields');
                return;
            }

            if (username.length < 3) {
                showError('❌ Username must be at least 3 characters');
                return;
            }

            if (password.length < 4) {
                showError('❌ Password must be at least 4 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('❌ Passwords do not match');
                return;
            }

            const users = getUsers();

            if (users[username]) {
                showError('❌ Username already exists. Please login.');
                return;
            }

            // Save user with background preference
            const bgPreference = customBgUrl ? { type: 'custom', url: customBgUrl } : { type: selectedBg, url: null };
            
            users[username] = {
                password: password,
                name: username,
                created: new Date().toISOString(),
                background: bgPreference
            };
            saveUsers(users);

            showSuccess('✅ Account created successfully! Redirecting to login...');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        }

        document.getElementById('confirmPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') signup();
        });
    </script>
</body>
</html>
