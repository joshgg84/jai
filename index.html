<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JAI | Document Assistant</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a0f1e,#0a1a2a);}
        .container{max-width:1000px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;}
        .header{text-align:center;padding:20px;background:rgba(10,20,35,0.2);backdrop-filter:blur(12px);border-radius:30px;margin-bottom:20px;}
        .header h1{font-size:2rem;background:linear-gradient(135deg,#00d4ff,#00ffaa);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .chat-container{background:rgba(10,20,35,0.2);backdrop-filter:blur(12px);border-radius:24px;overflow:hidden;flex:1;display:flex;flex-direction:column;height:60vh;}
        .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
        .message{display:flex;gap:12px;animation:fadeIn 0.3s;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .message.user{justify-content:flex-end;}
        .message.user .bubble{background:linear-gradient(135deg,#00d4ff,#00aa88);color:#0a0f1e;border-radius:20px 20px 8px 20px;}
        .message.ai .bubble{background:rgba(30,45,65,0.9);border-radius:20px 20px 20px 8px;border:1px solid rgba(0,255,255,0.2);}
        .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
        .message.ai .avatar{background:linear-gradient(135deg,#00d4ff,#00ffaa);}
        .message.user .avatar{background:#2d3748;order:2;}
        .bubble{max-width:70%;padding:12px 16px;font-size:0.9rem;line-height:1.5;word-wrap:break-word;}
        .message-controls{display:flex;gap:8px;margin-top:6px;margin-left:48px;}
        .speak-btn,.copy-btn{background:rgba(0,212,255,0.2);border:none;border-radius:20px;padding:4px 12px;font-size:0.7rem;color:#00d4ff;cursor:pointer;}
        .input-area{padding:16px;background:rgba(15,25,45,0.3);border-top:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;gap:12px;}
        .input-row{display:flex;gap:12px;width:100%;}
        .input-area input{flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:40px;padding:14px 20px;color:white;font-size:1rem;outline:none;}
        .input-area input:focus{border-color:#00d4ff;}
        .input-area input:disabled{opacity:0.5;cursor:not-allowed;}
        .input-area button{background:linear-gradient(135deg,#00d4ff,#00aa88);border:none;border-radius:40px;padding:0 28px;font-weight:bold;cursor:pointer;color:#0a0f1e;}
        .input-area button:disabled{opacity:0.5;cursor:not-allowed;}
        .doc-upload-area{display:flex;gap:10px;align-items:center;padding:8px 12px;background:rgba(0,212,255,0.1);border-radius:40px;flex-wrap:wrap;}
        .doc-upload-label{color:#00d4ff;font-size:0.8rem;cursor:pointer;padding:4px 12px;background:rgba(0,212,255,0.2);border-radius:20px;}
        .doc-upload-label:hover{background:rgba(0,212,255,0.4);}
        .file-info{font-size:0.7rem;color:#888;flex:1;}
        .clear-doc-btn{background:rgba(255,80,80,0.2);border:none;border-radius:20px;padding:4px 12px;font-size:0.7rem;color:#ff8888;cursor:pointer;}
        .clear-doc-btn:hover{background:rgba(255,80,80,0.4);}
        .active-badge{background:#00aa88;color:#0a0f1e;border-radius:12px;padding:4px 12px;font-size:0.7rem;font-weight:bold;}
        .footer{text-align:center;font-size:0.7rem;color:rgba(255,255,255,0.5);margin-top:20px;}
        .messages::-webkit-scrollbar{width:6px;}
        .messages::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);}
        .messages::-webkit-scrollbar-thumb{background:#00d4ff;}
        @media(max-width:600px){.bubble{max-width:85%;}.input-row{flex-direction:column;}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗣️ JAI</h1>
        </div>
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message ai">
                    <div class="avatar">🗣️</div>
                    <div class="bubble">Hello! 📄 Upload a document and I'll help you understand it. Just type your questions naturally!</div>
                </div>
            </div>
            <div class="input-area">
                <div class="doc-upload-area">
                    <label class="doc-upload-label" onclick="document.getElementById('fileInput').click()">📄 Upload Document</label>
                    <input type="file" id="fileInput" accept=".pdf,.docx,.txt" style="display:none" onchange="handleFileUpload(this)">
                    <span id="fileInfo" class="file-info">No document loaded</span>
                    <button class="clear-doc-btn" onclick="clearDocument()" id="clearDocBtn" style="display:none">Clear</button>
                    <span id="activeBadge" class="active-badge" style="display:none">📄 Active</span>
                </div>
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Type your message here..." autocomplete="off">
                    <button id="sendBtn">Send</button>
                </div>
            </div>
        </div>
        <div class="footer">📄 Upload PDF/DOCX/TXT | 💬 Ask questions naturally | 🔊 Click Listen on any response</div>
    </div>

    <script>
        // Auth check
        const currentUser = localStorage.getItem('jai_current_user');
        if (!currentUser) {
            window.location.href = 'login.html';
        }
        
        const userName = localStorage.getItem('jai_name') || currentUser;
        
        const API_URL = 'https://jai1-sh81.onrender.com';
        let currentAudio = null;
        
        // DOM elements
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInfo = document.getElementById('fileInfo');
        const clearDocBtn = document.getElementById('clearDocBtn');
        const activeBadge = document.getElementById('activeBadge');

        // File to base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
            });
        }

        // Handle file upload
        async function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            if (file.size > 10 * 1024 * 1024) {
                addMessage("❌ File too large. Max 10MB.", false);
                return;
            }
            
            addMessage(`📄 Uploading "${file.name}"...`, false);
            showTyping();
            
            try {
                const base64 = await fileToBase64(file);
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `upload_doc:${file.name}:${base64}`,
                        clientId: currentUser
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.response) {
                    addMessage(data.response, false);
                    
                    // Update UI to show document is active
                    fileInfo.innerHTML = `✅ ${file.name.substring(0, 40)}`;
                    clearDocBtn.style.display = 'inline-block';
                    activeBadge.style.display = 'inline-block';
                    
                    // Make sure input is enabled
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                    messageInput.focus();
                }
            } catch(e) {
                hideTyping();
                addMessage(`❌ Error: ${e.message}`, false);
            }
            input.value = '';
        }

        // Clear document
        function clearDocument() {
            fileInfo.innerHTML = 'No document loaded';
            clearDocBtn.style.display = 'none';
            activeBadge.style.display = 'none';
            addMessage("🗑️ Document cleared. You can upload a new one.", false);
            
            // Ensure input is still enabled
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        // Add message to chat
        function addMessage(msg, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = isUser ? '👤' : '🗣️';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = msg.replace(/\n/g, '<br>');
            
            div.appendChild(avatar);
            div.appendChild(bubble);
            
            if (!isUser) {
                const ctrl = document.createElement('div');
                ctrl.className = 'message-controls';
                
                const speakBtn = document.createElement('button');
                speakBtn.className = 'speak-btn';
                speakBtn.innerHTML = '🔊 Listen';
                speakBtn.onclick = () => speakText(msg);
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerHTML = '📋 Copy';
                copyBtn.onclick = () => copyToClipboard(msg);
                
                ctrl.appendChild(speakBtn);
                ctrl.appendChild(copyBtn);
                div.appendChild(ctrl);
            }
            
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Text to speech
        function speakText(text) {
            if (!text) return;
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            const cleanText = text.replace(/[📄🔍🌤️💰🧮✅❌📚⚖️💡]/g, '').replace(/\*\*/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // Copy to clipboard
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            addMessage("📋 Copied to clipboard!", false);
        }

        // Typing indicator
        function showTyping() {
            const d = document.createElement('div');
            d.className = 'message ai';
            d.id = 'typingIndicator';
            d.innerHTML = '<div class="avatar">🗣️</div><div class="bubble">JAI is thinking...</div>';
            messagesContainer.appendChild(d);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTyping() {
            const t = document.getElementById('typingIndicator');
            if (t) t.remove();
        }

        // Send message
        async function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg) return;
            
            // Disable input while sending
            messageInput.disabled = true;
            sendBtn.disabled = true;
            
            addMessage(msg, true);
            messageInput.value = '';
            showTyping();
            
            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: msg, 
                        clientId: currentUser 
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.response) {
                    addMessage(data.response, false);
                } else {
                    addMessage("I'm here. What's on your mind?", false);
                }
            } catch(e) {
                hideTyping();
                addMessage(`❌ Error: ${e.message}`, false);
            } finally {
                // Re-enable input
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !messageInput.disabled) {
                sendMessage();
            }
        });
        
        // Initial focus
        messageInput.focus();
        
        // Keep-alive ping
        setInterval(() => {
            fetch(`${API_URL}/health`).catch(e => console.log('Ping failed'));
        }, 10 * 60 * 1000);
    </script>
</body>
</html>
