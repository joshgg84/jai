<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JAI | Smart Assistant</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a0f1e,#0a1a2a);transition:background 0.3s;}
        .container{max-width:1000px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;}
        .header{text-align:center;padding:20px;background:rgba(10,20,35,0.2);backdrop-filter:blur(12px);border-radius:30px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1);}
        .header h1{font-size:2rem;background:linear-gradient(135deg,#00d4ff,#00ffaa);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .user-info{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1);flex-wrap:wrap;gap:10px;}
        .user-name{color:#00d4ff;font-size:0.85rem;}
        .nav-buttons{display:flex;gap:12px;flex-wrap:wrap;}
        .journal-btn,.doc-btn{background:rgba(0,212,255,0.2);border:1px solid rgba(0,212,255,0.3);padding:6px 16px;border-radius:30px;font-size:0.7rem;color:#00d4ff;cursor:pointer;text-decoration:none;}
        .logout-btn{background:rgba(255,80,80,0.2);border:1px solid rgba(255,80,80,0.5);padding:6px 16px;border-radius:30px;font-size:0.7rem;color:#ff8888;cursor:pointer;}
        .chat-container{background:rgba(10,20,35,0.2);backdrop-filter:blur(12px);border-radius:24px;border:1px solid rgba(255,255,255,0.1);overflow:hidden;flex:1;display:flex;flex-direction:column;height:55vh;}
        .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
        .message{display:flex;gap:12px;animation:fadeIn 0.3s;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .message.user{justify-content:flex-end;}
        .message.user .bubble{background:linear-gradient(135deg,#00d4ff,#00aa88);color:#0a0f1e;border-radius:20px 20px 8px 20px;}
        .message.ai .bubble{background:rgba(30,45,65,0.9);border-radius:20px 20px 20px 8px;border:1px solid rgba(0,255,255,0.2);}
        .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
        .message.ai .avatar{background:linear-gradient(135deg,#00d4ff,#00ffaa);}
        .message.user .avatar{background:#2d3748;order:2;}
        .bubble{max-width:75%;padding:12px 16px;font-size:0.9rem;line-height:1.5;word-wrap:break-word;overflow-wrap:break-word;}
        .message-controls{display:flex;gap:8px;margin-top:6px;margin-left:48px;flex-wrap:wrap;}
        .speak-btn,.copy-btn{background:rgba(0,212,255,0.2);border:none;border-radius:20px;padding:4px 12px;font-size:0.7rem;color:#00d4ff;cursor:pointer;}
        .input-area{padding:16px;background:rgba(15,25,45,0.3);border-top:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;gap:12px;}
        .input-row{display:flex;gap:12px;}
        .input-area input{flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:40px;padding:14px 20px;color:white;font-size:1rem;outline:none;}
        .input-area input:focus{border-color:#00d4ff;}
        .input-area button{background:linear-gradient(135deg,#00d4ff,#00aa88);border:none;border-radius:40px;padding:0 28px;font-weight:bold;cursor:pointer;color:#0a0f1e;}
        .doc-upload-area{display:flex;gap:10px;align-items:center;padding:8px 12px;background:rgba(0,212,255,0.1);border-radius:40px;border:1px dashed rgba(0,212,255,0.3);}
        .doc-upload-label{color:#00d4ff;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;gap:6px;}
        .doc-upload-label:hover{color:#00ffaa;}
        .file-info{font-size:0.7rem;color:#888;flex:1;}
        .clear-doc-btn{background:rgba(255,80,80,0.2);border:none;border-radius:20px;padding:4px 12px;font-size:0.7rem;color:#ff8888;cursor:pointer;}
        .footer{text-align:center;font-size:0.7rem;color:rgba(255,255,255,0.5);margin-top:20px;}
        .messages::-webkit-scrollbar{width:6px;}
        .messages::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);}
        .messages::-webkit-scrollbar-thumb{background:#00d4ff;}
        .waking-msg{background:rgba(255,200,100,0.2);border:1px solid rgba(255,200,100,0.5);}
        .doc-badge{background:rgba(0,212,255,0.3);border-radius:12px;padding:2px 8px;font-size:0.7rem;margin-left:8px;}
        @media(max-width:600px){.bubble{max-width:85%;font-size:0.85rem;}.avatar{width:32px;height:32px;}.input-row{flex-direction:column;}.doc-upload-area{flex-wrap:wrap;}}
    </style>
</head>
<body id="appBody">
    <div class="container">
        <div class="header">
            <h1>🗣️ JAI</h1>
            <div class="user-info">
                <span class="user-name">👤 <span id="userName"></span></span>
                <div class="nav-buttons">
                    <a href="journal.html" class="journal-btn">📔 Journal</a>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message ai">
                    <div class="avatar">🗣️</div>
                    <div class="bubble">Hey <span id="welcomeName"></span>! I can now read documents 📄, search online 🔍, check weather 🌤️, and convert currency 💰. What's on your mind?</div>
                </div>
            </div>
            <div class="input-area">
                <div class="doc-upload-area" id="docUploadArea">
                    <label class="doc-upload-label" onclick="document.getElementById('fileInput').click()">
                        📄 Upload Document
                    </label>
                    <input type="file" id="fileInput" accept=".pdf,.docx,.txt" style="display:none" onchange="handleFileUpload(this)">
                    <span id="fileInfo" class="file-info">No document loaded</span>
                    <button class="clear-doc-btn" onclick="clearDocument()" style="display:none" id="clearDocBtn">Clear</button>
                    <span id="docBadge" class="doc-badge" style="display:none"></span>
                </div>
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Type your message... or ask about your document..." autocomplete="off">
                    <button id="sendBtn">Send</button>
                </div>
            </div>
        </div>
        <div class="footer">
            🔊 Click Listen to hear JAI speak | 📄 Upload PDF/DOCX/TXT | 🔍 Ask anything!
        </div>
    </div>

    <script>
        // Auth check
        const currentUser = localStorage.getItem('jai_current_user');
        if (!currentUser) window.location.href = 'login.html';
        
        const userName = localStorage.getItem('jai_name') || currentUser;
        document.getElementById('userName').textContent = userName;
        document.getElementById('welcomeName').textContent = userName;

        function logout() {
            localStorage.removeItem('jai_current_user');
            localStorage.removeItem('jai_name');
            window.location.href = 'login.html';
        }

        // JAI1 API
        const API_URL = 'https://jai1-sh81.onrender.com';
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let currentAudio = null;
        let currentDocId = null;
        let currentDocName = null;

        // Keep-alive ping every 10 minutes
        setInterval(() => {
            fetch(`${API_URL}/health`).catch(e => console.log('Keep-alive ping failed'));
        }, 10 * 60 * 1000);

        // Convert file to base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = error => reject(error);
            });
        }

        // Handle file upload
        async function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            if (file.size > 10 * 1024 * 1024) {
                addMessage("❌ File too large. Maximum size is 10MB.", false);
                return;
            }
            
            addMessage(`📄 Uploading "${file.name}"... Please wait.`, false);
            showTyping();
            
            try {
                const base64 = await fileToBase64(file);
                
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `upload_doc:${file.name}:${base64}`,
                        clientId: currentUser
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.response) {
                    addMessage(data.response, false);
                    
                    // Extract document ID from response
                    const docIdMatch = data.response.match(/Document ID: `([^`]+)`/);
                    if (docIdMatch) {
                        currentDocId = docIdMatch[1];
                        currentDocName = file.name;
                        document.getElementById('fileInfo').innerHTML = `📄 ${file.name} (ready)`;
                        document.getElementById('clearDocBtn').style.display = 'inline-block';
                        document.getElementById('docBadge').style.display = 'inline-block';
                        document.getElementById('docBadge').innerHTML = `Active: ${file.name.substring(0, 20)}`;
                        addMessage(`💡 You can now ask questions about "${file.name}". Just type your question normally!`, false);
                    }
                } else {
                    addMessage("❌ Failed to upload document. Please try again.", false);
                }
            } catch(e) {
                hideTyping();
                addMessage(`❌ Upload error: ${e.message}`, false);
            }
            
            input.value = '';
        }

        // Clear current document
        function clearDocument() {
            currentDocId = null;
            currentDocName = null;
            document.getElementById('fileInfo').innerHTML = 'No document loaded';
            document.getElementById('clearDocBtn').style.display = 'none';
            document.getElementById('docBadge').style.display = 'none';
            addMessage("🗑️ Document cleared. You can upload a new one anytime.", false);
        }

        async function speakText(text) {
            if (!text) return;
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            
            // Clean text for speech (remove markdown and emojis)
            const cleanText = text.replace(/[📄🔍🌤️💰🧮✅❌📚]/g, '').replace(/\*\*/g, '');
            
            try {
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.pitch = 1;
                
                // Try to use a natural voice if available
                const voices = window.speechSynthesis.getVoices();
                const preferredVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google'));
                if (preferredVoice) utterance.voice = preferredVoice;
                
                window.speechSynthesis.speak(utterance);
            } catch(e) {
                console.log('Speech error:', e);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            addMessage("📋 Copied to clipboard!", false);
        }

        function addMessage(msg, isUser = false, isWakeMsg = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'ai'}`;
            if (isWakeMsg) div.classList.add('waking-msg');
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = isUser ? '👤' : '🗣️';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = msg.replace(/\n/g, '<br>');
            div.appendChild(avatar);
            div.appendChild(bubble);
            if (!isUser && !isWakeMsg) {
                const ctrl = document.createElement('div');
                ctrl.className = 'message-controls';
                const speakBtn = document.createElement('button');
                speakBtn.className = 'speak-btn';
                speakBtn.innerHTML = '🔊 Listen';
                speakBtn.onclick = () => speakText(msg);
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerHTML = '📋 Copy';
                copyBtn.onclick = () => copyToClipboard(msg);
                ctrl.appendChild(speakBtn);
                ctrl.appendChild(copyBtn);
                div.appendChild(ctrl);
            }
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return div;
        }

        function showTyping() {
            const d = document.createElement('div');
            d.className = 'message ai';
            d.id = 'typingIndicator';
            d.innerHTML = '<div class="avatar">🗣️</div><div class="bubble">JAI is thinking...</div>';
            messagesContainer.appendChild(d);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTyping() { const t = document.getElementById('typingIndicator'); if (t) t.remove(); }

        async function sendMessage() {
            let msg = messageInput.value.trim();
            if (!msg) return;
            
            // If we have an active document and user isn't using a command, auto-prefix with ask_doc
            if (currentDocId && !msg.startsWith('upload_doc') && !msg.startsWith('ask_doc') && !msg.startsWith('teach') && !msg.startsWith('next time')) {
                msg = `ask_doc:${currentDocId}:${msg}`;
            }
            
            addMessage(messageInput.value.trim(), true);
            messageInput.value = '';
            messageInput.focus();
            
            showTyping();
            
            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, clientId: currentUser })
                });
                const data = await response.json();
                hideTyping();
                
                if (data.response) {
                    addMessage(data.response, false);
                } else {
                    addMessage("I'm here. What's on your mind?", false);
                }
            } catch(e) {
                hideTyping();
                addMessage(`❌ Error: ${e.message}. Please check your connection.`, false);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        
        // Pre-warm on page load
        fetch(`${API_URL}/health`).catch(e => console.log('Pre-warm failed'));
        
        messageInput.focus();
        
        // Load voices for speech
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
