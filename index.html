<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAI | Document Assistant</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a0f1e,#0a1a2a);}
        .container{max-width:1000px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;}
        .header{text-align:center;padding:20px;background:rgba(10,20,35,0.2);backdrop-filter:blur(12px);border-radius:30px;margin-bottom:20px;}
        .header h1{font-size:2rem;background:linear-gradient(135deg,#00d4ff,#00ffaa);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .chat-container{background:rgba(10,20,35,0.2);backdrop-filter:blur(12px);border-radius:24px;overflow:hidden;flex:1;display:flex;flex-direction:column;height:60vh;}
        .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
        .message{display:flex;gap:12px;}
        .message.user{justify-content:flex-end;}
        .message.user .bubble{background:linear-gradient(135deg,#00d4ff,#00aa88);color:#0a0f1e;border-radius:20px 20px 8px 20px;}
        .message.ai .bubble{background:rgba(30,45,65,0.9);border-radius:20px 20px 20px 8px;border:1px solid rgba(0,255,255,0.2);}
        .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
        .message.ai .avatar{background:linear-gradient(135deg,#00d4ff,#00ffaa);}
        .bubble{max-width:70%;padding:12px 16px;font-size:0.9rem;line-height:1.5;}
        .input-area{padding:16px;background:rgba(15,25,45,0.3);border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:12px;}
        .input-area input{flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:40px;padding:14px 20px;color:white;font-size:1rem;outline:none;}
        .input-area button{background:linear-gradient(135deg,#00d4ff,#00aa88);border:none;border-radius:40px;padding:0 28px;font-weight:bold;cursor:pointer;}
        .doc-upload-area{display:flex;gap:10px;align-items:center;padding:8px 12px;background:rgba(0,212,255,0.1);border-radius:40px;margin-bottom:12px;}
        .doc-upload-label{color:#00d4ff;font-size:0.8rem;cursor:pointer;}
        .file-info{font-size:0.7rem;color:#888;}
        .clear-doc-btn{background:rgba(255,80,80,0.2);border:none;border-radius:20px;padding:4px 12px;font-size:0.7rem;color:#ff8888;cursor:pointer;}
        .active-badge{background:#00aa88;color:#0a0f1e;border-radius:12px;padding:2px 10px;font-size:0.7rem;}
        .footer{text-align:center;font-size:0.7rem;color:rgba(255,255,255,0.5);margin-top:20px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗣️ JAI</h1>
        </div>
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message ai">
                    <div class="avatar">🗣️</div>
                    <div class="bubble">Hello! Upload a document and I'll help you understand it. Just ask naturally!</div>
                </div>
            </div>
            <div class="input-area">
                <div class="doc-upload-area">
                    <label class="doc-upload-label" onclick="document.getElementById('fileInput').click()">📄 Upload Document</label>
                    <input type="file" id="fileInput" accept=".pdf,.docx,.txt" style="display:none" onchange="handleFileUpload(this)">
                    <span id="fileInfo" class="file-info">No document</span>
                    <button class="clear-doc-btn" onclick="clearDocument()" id="clearDocBtn" style="display:none">Clear</button>
                    <span id="activeBadge" class="active-badge" style="display:none"></span>
                </div>
                <input type="text" id="messageInput" placeholder="Ask about your document..." autocomplete="off">
                <button id="sendBtn">Send</button>
            </div>
        </div>
        <div class="footer">📄 Upload PDF/DOCX/TXT | 💬 Ask questions naturally | No ID needed!</div>
    </div>

    <script>
        const API_URL = 'https://jai1-sh81.onrender.com';
        let currentUser = localStorage.getItem('jai_current_user');
        if (!currentUser) {
            currentUser = 'user_' + Date.now();
            localStorage.setItem('jai_current_user', currentUser);
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
            });
        }

        async function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            addMessage(`📄 Uploading "${file.name}"...`, false);
            
            try {
                const base64 = await fileToBase64(file);
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `upload_doc:${file.name}:${base64}`,
                        clientId: currentUser
                    })
                });
                
                const data = await response.json();
                addMessage(data.response, false);
                
                if (data.response.includes('Document uploaded')) {
                    document.getElementById('fileInfo').innerHTML = `✅ ${file.name.substring(0, 30)}`;
                    document.getElementById('clearDocBtn').style.display = 'inline-block';
                    document.getElementById('activeBadge').style.display = 'inline-block';
                    document.getElementById('activeBadge').innerHTML = `📄 Active`;
                }
            } catch(e) {
                addMessage(`❌ Error: ${e.message}`, false);
            }
            input.value = '';
        }

        function clearDocument() {
            document.getElementById('fileInfo').innerHTML = 'No document';
            document.getElementById('clearDocBtn').style.display = 'none';
            document.getElementById('activeBadge').style.display = 'none';
            addMessage("🗑️ Document cleared. Upload a new one anytime.", false);
        }

        function addMessage(msg, isUser) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'ai'}`;
            div.innerHTML = `<div class="avatar">${isUser ? '👤' : '🗣️'}</div><div class="bubble">${msg.replace(/\n/g, '<br>')}</div>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            addMessage(msg, true);
            input.value = '';
            
            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, clientId: currentUser })
                });
                const data = await response.json();
                addMessage(data.response, false);
            } catch(e) {
                addMessage(`Error: ${e.message}`, false);
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
