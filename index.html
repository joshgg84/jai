<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JAI | Chat</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background 0.3s;}
        .container{max-width:800px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;}
        .header{text-align:center;padding:20px;background:rgba(10,20,35,0.2);backdrop-filter:blur(12px);border-radius:30px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 10px 30px rgba(0,0,0,0.2);}
        .header h1{font-size:2rem;background:linear-gradient(135deg,#00d4ff,#00ffaa);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .user-info{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1);}
        .user-name{color:#00d4ff;font-size:0.85rem;}
        .settings-link{background:rgba(0,212,255,0.2);border:1px solid rgba(0,212,255,0.3);padding:6px 16px;border-radius:30px;font-size:0.7rem;color:#00d4ff;cursor:pointer;text-decoration:none;}
        .logout-btn{background:rgba(255,80,80,0.2);border:1px solid rgba(255,80,80,0.5);padding:6px 16px;border-radius:30px;font-size:0.7rem;color:#ff8888;cursor:pointer;margin-left:10px;}
        .chat-container{background:rgba(10,20,35,0.2);backdrop-filter:blur(12px);border-radius:24px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 10px 30px rgba(0,0,0,0.2);overflow:hidden;flex:1;display:flex;flex-direction:column;height:60vh;}
        .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
        .message{display:flex;gap:12px;animation:fadeIn 0.3s;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .message.user{justify-content:flex-end;}
        .message.user .bubble{background:linear-gradient(135deg,#00d4ff,#00aa88);color:#0a0f1e;border-radius:20px 20px 8px 20px;}
        .message.ai .bubble{background:rgba(30,45,65,0.9);border-radius:20px 20px 20px 8px;border:1px solid rgba(0,255,255,0.2);}
        .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
        .message.ai .avatar{background:linear-gradient(135deg,#00d4ff,#00ffaa);}
        .message.user .avatar{background:#2d3748;order:2;}
        .bubble{max-width:75%;padding:12px 16px;font-size:0.9rem;line-height:1.5;}
        .message-controls{display:flex;gap:8px;margin-top:6px;margin-left:48px;}
        .speak-btn{background:rgba(0,212,255,0.2);border:none;border-radius:20px;padding:4px 12px;font-size:0.7rem;color:#00d4ff;cursor:pointer;}
        .input-area{padding:16px;background:rgba(15,25,45,0.3);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:12px;}
        .input-area input{flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:40px;padding:14px 20px;color:white;font-size:1rem;outline:none;}
        .input-area input:focus{border-color:#00d4ff;box-shadow:0 0 10px rgba(0,212,255,0.3);}
        .input-area input::placeholder{color:rgba(255,255,255,0.4);}
        .input-area button{background:linear-gradient(135deg,#00d4ff,#00aa88);border:none;border-radius:40px;padding:0 28px;font-weight:bold;cursor:pointer;}
        .footer{text-align:center;font-size:0.7rem;color:rgba(255,255,255,0.5);margin-top:20px;}
        .messages::-webkit-scrollbar{width:6px;}
        .messages::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);}
        .messages::-webkit-scrollbar-thumb{background:#00d4ff;border-radius:3px;}
        @media(max-width:600px){.bubble{max-width:85%;font-size:0.85rem;}.avatar{width:32px;height:32px;}}
    </style>
</head>
<body id="appBody">
    <div class="container">
        <div class="header">
            <h1>🗣️ JAI</h1>
            <div class="user-info">
                <span class="user-name">👤 <span id="userName"></span></span>
                <div>
                    <a href="settings.html" class="settings-link">⚙️ Settings</a>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message ai">
                    <div class="avatar">🗣️</div>
                    <div class="bubble">Hey <span id="welcomeName"></span>. What's on your mind?</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
                <button id="sendBtn">Send</button>
            </div>
        </div>
        <div class="footer">🔊 Click Listen to hear JAI speak | <a href="settings.html" style="color:#00d4ff;">Change Background</a></div>
    </div>

    <script>
        // Auth check
        const currentUser = localStorage.getItem('jai_current_user');
        if (!currentUser) window.location.href = 'login.html';
        
        const userName = localStorage.getItem('jai_name') || currentUser;
        document.getElementById('userName').textContent = userName;
        document.getElementById('welcomeName').textContent = userName;

        function logout() {
            localStorage.removeItem('jai_current_user');
            localStorage.removeItem('jai_name');
            window.location.href = 'login.html';
        }

        // Load saved background from user settings
        function loadSavedBackground() {
            const users = JSON.parse(localStorage.getItem('jai_users') || '{}');
            const userBg = users[currentUser]?.background;
            const body = document.getElementById('appBody');
            
            if (userBg) {
                if (userBg.type === 'custom' && userBg.url) {
                    body.style.background = `url("${userBg.url}") center/cover fixed`;
                } else {
                    const bgMap = {
                        default: 'linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%)',
                        ocean: 'url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600") center/cover fixed',
                        forest: 'url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1600") center/cover fixed',
                        mountain: 'url("https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600") center/cover fixed',
                        sunset: 'url("https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=1600") center/cover fixed'
                    };
                    body.style.background = bgMap[userBg.type] || bgMap.default;
                }
            } else {
                body.style.background = 'linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%)';
            }
        }

        // Chat with JAI1
        const API_URL = 'https://jai1-sh81.onrender.com';
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let currentAudio = null;

        async function speakText(text) {
            if (!text) return;
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            try {
                const res = await fetch(`${API_URL}/api/speak`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                if (data.success && data.audio) {
                    const blob = atob(data.audio).split('').map(c => c.charCodeAt(0));
                    const audioBlob = new Blob([new Uint8Array(blob)], { type: 'audio/mp3' });
                    const url = URL.createObjectURL(audioBlob);
                    currentAudio = new Audio(url);
                    currentAudio.onended = () => URL.revokeObjectURL(url);
                    currentAudio.play();
                } else {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            } catch(e) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        function addMessage(msg, isUser = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'ai'}`;
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = isUser ? '👤' : '🗣️';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = msg.replace(/\n/g, '<br>');
            div.appendChild(avatar);
            div.appendChild(bubble);
            if (!isUser) {
                const ctrl = document.createElement('div');
                ctrl.className = 'message-controls';
                const btn = document.createElement('button');
                btn.className = 'speak-btn';
                btn.innerHTML = '🔊 Listen';
                btn.onclick = () => speakText(msg);
                ctrl.appendChild(btn);
                div.appendChild(ctrl);
            }
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTyping() {
            const d = document.createElement('div');
            d.className = 'message ai';
            d.id = 'typingIndicator';
            d.innerHTML = '<div class="avatar">🗣️</div><div class="bubble">JAI is thinking...</div>';
            messagesContainer.appendChild(d);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTyping() { const t = document.getElementById('typingIndicator'); if (t) t.remove(); }

        async function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg) return;
            addMessage(msg, true);
            messageInput.value = '';
            messageInput.focus();
            showTyping();
            try {
                const res = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, clientId: 'jai2' })
                });
                const data = await res.json();
                hideTyping();
                if (data.response) addMessage(data.response, false);
                else addMessage("I'm here. What's on your mind?", false);
            } catch(e) {
                hideTyping();
                addMessage(`❌ Error: ${e.message}`, false);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        
        loadSavedBackground();
        messageInput.focus();
    </script>
</body>
</html>
